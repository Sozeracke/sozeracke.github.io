{% extends "base.html" %}

{% block title %}Регистрация — Блог{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Регистрация</h1>
        <p class="auth-subtitle">Создайте новый аккаунт</p>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Имя пользователя</label>
                <input type="text" id="username" name="username" required autofocus
                       placeholder="myusername" minlength="3">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" required
                       placeholder="минимум 6 символов" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirm">Подтвердите пароль</label>
                <input type="password" id="confirm" name="confirm" required
                       placeholder="повторите пароль">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
        </form>

        <p class="auth-footer">
            Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
        </p>
    </div>
</div>
{% endblock %}
