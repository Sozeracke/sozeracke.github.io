{% extends "base.html" %}

{% block title %}Страница не найдена — {{ site_name }}{% endblock %}

{% block content %}
<div class="empty-state">
    <div class="empty-icon">🔍</div>
    <h2>Страница не найдена</h2>
    <p>Такой страницы нет. Возможно, сервер только просыпается — подождите и попробуйте снова.</p>
    <div class="error-actions">
        <a href="{{ url_for('index') }}" class="btn btn-primary">На главную</a>
        <a href="{{ url_for('login') }}" class="btn btn-ghost">Войти</a>
    </div>
</div>
{% endblock %}
