name: Keep Render awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping blog
        run: |
          curl -fsS --max-time 120 "https://sozeracke-blog.onrender.com/health" || \
          curl -fsS --max-time 120 "https://sozeracke-blog.onrender.com/"