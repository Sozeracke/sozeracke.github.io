databases:
  - name: blog-db
    plan: free

services:
  - type: web
    name: sozeracke-blog
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30 --threads 4
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: SITE_OWNER
        value: Sozeracke
      - key: ADMIN_USERNAMES
        value: Sozeracke,xReamble
      - key: SITE_URL
        value: https://sozeracke.github.io
      - key: PUBLIC_URL
        value: https://sozeracke-blog.onrender.com