services:
  - type: web
    name: sozeracke-blog
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_OWNER
        value: Sozeracke
      - key: SITE_URL
        value: https://sozeracke.github.io