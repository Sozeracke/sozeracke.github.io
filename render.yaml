services:
  - type: web
    name: sozeracke-blog
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: SITE_OWNER
        value: Sozeracke
      - key: ADMIN_USERNAME
        value: Sozeracke
      - key: SITE_URL
        value: https://sozeracke.github.io